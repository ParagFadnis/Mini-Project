<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Animal Welfare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <div class="back-btn" onclick="goTo('home.html')">
                <span>←</span> Back
            </div>

            <div class="auth-header">
                <div class="auth-icon">🐱</div>
                <h2>Join Our Community</h2>
                <p>Create your account</p>
            </div>

            <form class="auth-form" onsubmit="event.preventDefault(); register();">
                <div class="form-group">
                    <label for="regRole">Select Role</label>
                    <div class="select-wrapper">
                        <select id="regRole" required>
                            <option value="">Choose your role...</option>
                            <option value="public">👤 Public User</option>
                            <option value="volunteer">🚑 Volunteer</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" required>
                </div>

                /*Added this block*/
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="Enter Your Email" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Create password" required>
                        <span class="toggle-password" onclick="togglePassword('regPassword')">👁️</span>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <span>Create Account</span>
                    <span class="btn-arrow">→</span>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? 
                <span class="link" onclick="goTo('login.html')">Login</span>
            </div>
        </div>

        <div class="auth-illustration">
            <div class="floating-animal">🐦</div>
            <div class="floating-animal">🐾</div>
            <div class="floating-animal">🦜</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
